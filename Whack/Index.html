<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Whack-a-Mole</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, orientation=landscape" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            box-sizing: border-box;
        }
        *, *::before, *::after { box-sizing: border-box; }

        body {
            background: #0f1419;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            width: 100vw;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .game-container {
            position: relative;
            width: 100%;
            height: 100%;
            min-width: 0;
            min-height: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        canvas {
            display: block;
            background: #0a0c0e;
            width: 100%;
            height: 100%;
            object-fit: contain;
            touch-action: none;
        }

        .back-btn {
            position: fixed;
            top: max(12px, env(safe-area-inset-top));
            left: max(12px, env(safe-area-inset-left));
            padding: 10px 14px;
            border-radius: 999px;
            border: none;
            font-size: 14px;
            background: rgba(20, 25, 32, 0.9);
            color: #e5e7eb;
            cursor: pointer;
            opacity: 0.9;
            z-index: 20;
            -webkit-tap-highlight-color: transparent;
        }
        .back-btn:hover, .back-btn:active { opacity: 1; }

        .ui-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }
        .ui-overlay .whack-menu-overlay,
        .ui-overlay .whack-gameover-overlay {
            pointer-events: auto;
        }
        .whack-hud {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 14px 20px;
            padding-top: max(14px, env(safe-area-inset-top));
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            font-family: system-ui, -apple-system, Arial, sans-serif;
            background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.15) 70%, transparent 100%);
            -webkit-font-smoothing: antialiased;
        }
        .whack-hud .hud-left,
        .whack-hud .hud-right {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 0;
        }
        .whack-hud .hud-left { align-items: flex-start; }
        .whack-hud .hud-right { align-items: flex-end; }
        .whack-hud .hud-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.65);
        }
        .whack-hud .hud-value {
            font-size: clamp(20px, 5vw, 28px);
            font-weight: 800;
            color: #fff;
            line-height: 1.1;
        }
        .whack-hud .hud-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            padding: 10px 24px;
            border-radius: 14px;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        }
        .whack-hud .hud-center .hud-label {
            font-size: 9px;
            margin-bottom: 2px;
            color: rgba(255,255,255,0.6);
        }
        .whack-hud .hud-center .hud-value {
            font-size: clamp(28px, 7vw, 42px);
            font-weight: 800;
            letter-spacing: 0.02em;
            color: #fff;
        }
        .whack-hud .hud-value.time-low { color: #f87171; }
        .whack-hud .hud-combo {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 72px;
            padding: 4px 14px;
            border-radius: 999px;
            background: rgba(250, 204, 21, 0.2);
            border: 1px solid rgba(250, 204, 21, 0.4);
            color: #facc15;
            font-size: clamp(14px, 3.5vw, 20px);
            font-weight: 700;
        }
        .whack-menu-overlay,
        .whack-gameover-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: min(90%, 420px);
            padding: 28px 24px;
            border-radius: 16px;
            background: rgba(15, 23, 42, 0.94);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        .whack-menu-overlay h1, .whack-gameover-overlay h1 {
            font-size: clamp(40px, 10vw, 56px);
            margin: 0 0 8px 0;
            color: #e5e7eb;
            font-family: system-ui, Arial, sans-serif;
        }
        .whack-menu-overlay h2 {
            font-size: clamp(28px, 7vw, 40px);
            color: #d97706;
            margin: 0 0 16px 0;
        }
        .whack-menu-overlay p, .whack-gameover-overlay p {
            font-size: clamp(16px, 4vw, 20px);
            color: rgba(229,231,235,0.9);
            margin: 6px 0;
        }
        .whack-go-title { font-size: clamp(36px, 9vw, 48px); }
        .whack-go-score { font-size: clamp(22px, 5vw, 28px); font-weight: bold; }
        .whack-new-best { font-size: clamp(18px, 4vw, 24px); color: #fbbf24; }
        .whack-best-line { font-size: clamp(18px, 4vw, 22px); color: rgba(229,231,235,0.8); }
        .whack-countdown { font-size: 16px; color: rgba(148,163,184,0.7); margin-top: 8px; }
        .whack-btn {
            padding: 14px 28px;
            font-size: clamp(18px, 4vw, 22px);
            font-weight: bold;
            color: #fff;
            border: 2px solid #d97706;
            border-radius: 10px;
            cursor: pointer;
            background: linear-gradient(135deg, #d97706, #b45309);
            margin: 16px auto;
            display: block;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }
        .whack-btn:hover { transform: scale(1.04); }
        .whack-btn:active { transform: scale(0.98); }

        .game-container.title-card-active canvas { filter: blur(10px); opacity: 0.5; }

        @media (max-width: 480px) {
            .whack-hud { padding: 10px 14px; padding-top: max(10px, env(safe-area-inset-top)); }
            .whack-hud .hud-center { padding: 8px 18px; }
            .whack-hud .hud-combo { top: 66px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.location.href = '../index.html'">
        ← Back to Menu
    </button>

    <div class="game-container title-card-active" id="whackGameContainer">
        <canvas id="gameCanvas" width="900" height="600"></canvas>
        <div class="ui-overlay">
            <div class="whack-hud" id="whackHud">
                <div class="hud-left">
                    <span class="hud-label">Score</span>
                    <span class="hud-value" id="whackScore">0</span>
                </div>
                <div class="hud-center">
                    <span class="hud-label">Time</span>
                    <span class="hud-value" id="whackTime">30</span>
                </div>
                <div class="hud-right">
                    <span class="hud-label">Lives</span>
                    <span class="hud-value" id="whackLives">3</span>
                </div>
                <div class="hud-combo" id="whackCombo" style="display: none;">Combo ×<span id="whackComboVal">2</span></div>
            </div>
            <div class="whack-menu-overlay" id="whackMenuOverlay">
                <h1>WHACK</h1>
                <h2>A MOLE</h2>
                <p>Click / Tap the moles to whack them!</p>
                <button type="button" class="whack-btn" id="whackStartBtn">Press to Start</button>
            </div>
            <div class="whack-gameover-overlay" id="whackGameOverOverlay" style="display: none;">
                <h1 class="whack-go-title" id="whackGameOverTitle">Game Over!</h1>
                <p class="whack-go-score">Final Score: <span id="whackFinalScore">0</span></p>
                <p class="whack-new-best" id="whackNewBest" style="display: none;">New Best Score!</p>
                <p class="whack-best-line">Best: <span id="whackBestScore">0</span></p>
                <button type="button" class="whack-btn" id="whackPlayAgainBtn" style="display: none;">Play Again</button>
                <p class="whack-countdown" id="whackCountdown"></p>
            </div>
        </div>
    </div>

    <script>
        // Responsive canvas: fit any screen (portrait or landscape) while keeping 900x600 logic
        function resizeCanvas() {
            const canvas = document.getElementById('gameCanvas');
            const container = document.getElementById('whackGameContainer');
            const gameWidth = 900;
            const gameHeight = 600;
            const aspectRatio = gameWidth / gameHeight;

            var maxWidth = (container && container.clientWidth) ? container.clientWidth : (window.innerWidth || document.documentElement.clientWidth);
            var maxHeight = (container && container.clientHeight) ? container.clientHeight : (window.innerHeight || document.documentElement.clientHeight);
            if (maxWidth <= 0) maxWidth = 320;
            if (maxHeight <= 0) maxHeight = 480;

            var displayWidth, displayHeight;
            if (maxWidth / maxHeight > aspectRatio) {
                displayHeight = maxHeight;
                displayWidth = displayHeight * aspectRatio;
            } else {
                displayWidth = maxWidth;
                displayHeight = displayWidth / aspectRatio;
            }

            canvas.style.width = displayWidth + 'px';
            canvas.style.height = displayHeight + 'px';
            canvas.width = gameWidth;
            canvas.height = gameHeight;

            var ctx = canvas.getContext('2d');
            if (ctx) {
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.imageSmoothingEnabled = true;
                if (ctx.imageSmoothingQuality) ctx.imageSmoothingQuality = 'high';
            }
        }

        // Lock screen orientation to landscape (mobile)
        function lockOrientation() {
            var orientation = 'landscape';
            var methods = [
                function() { if (screen.orientation && screen.orientation.lock) return screen.orientation.lock(orientation); },
                function() { if (screen.lockOrientation) return screen.lockOrientation(orientation); },
                function() { if (screen.mozLockOrientation) return screen.mozLockOrientation(orientation); },
                function() { if (screen.msLockOrientation) return screen.msLockOrientation(orientation); }
            ];
            for (var i = 0; i < methods.length; i++) {
                try {
                    var r = methods[i]();
                    if (r && typeof r.then === 'function') { r.catch(function() {}); return; }
                    if (r !== undefined) return;
                } catch (e) {}
            }
        }
        function lockOrientationAggressive() {
            lockOrientation();
            [50, 100, 200, 300, 500, 750, 1000].forEach(function(delay) {
                setTimeout(lockOrientation, delay);
            });
        }

        // Auto fullscreen + landscape lock
        function enterFullscreen() {
            var elem = document.documentElement;
            var body = document.body;
            try {
                if (elem.requestFullscreen) elem.requestFullscreen().catch(function(){});
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
                else if (elem.mozRequestFullScreen) elem.mozRequestFullScreen();
                else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
                else if (body && body.requestFullscreen) body.requestFullscreen().catch(function(){});
                else if (body && body.webkitRequestFullscreen) body.webkitRequestFullscreen();
            } catch (e) {}
            lockOrientationAggressive();
        }

        [0, 100, 300, 500].forEach(function(delay) { setTimeout(enterFullscreen, delay); });
        document.addEventListener('click', function onceClick() { enterFullscreen(); document.removeEventListener('click', onceClick); }, { once: true });
        document.addEventListener('touchstart', function onceTouch() { enterFullscreen(); document.removeEventListener('touchstart', onceTouch); }, { once: true });

        function initializeGame() {
            resizeCanvas();
            lockOrientationAggressive();
        }

        window.addEventListener('resize', function() { resizeCanvas(); });
        window.addEventListener('orientationchange', function() {
            setTimeout(function() { resizeCanvas(); lockOrientationAggressive(); }, 100);
        });

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeGame);
        } else {
            initializeGame();
        }
        window.addEventListener('load', function() { resizeCanvas(); });
    </script>
    <!-- Load utilities for error handling -->
    <script src="../common/utils.js"></script>
    <script>
        // Check browser support before loading game
        (function() {
            if (window.GameUtils && window.GameUtils.BrowserSupport) {
                const support = window.GameUtils.BrowserSupport.getStatus();
                
                if (!support.canvas) {
                    window.GameUtils.ErrorHandler.showError(
                        'Your browser does not support HTML5 Canvas. Please use a modern browser.',
                        true
                    );
                    return;
                }
                
                if (!support.animationFrame) {
                    window.GameUtils.ErrorHandler.showError(
                        'Your browser does not support requestAnimationFrame. Please use a modern browser.',
                        true
                    );
                    return;
                }
            }
        })();
    </script>
    <script src="game.js"></script>
    <script>
        // Ensure canvas is resized after game.js loads
        // This guarantees crisp rendering on all devices
        window.addEventListener('load', () => {
            setTimeout(() => {
                resizeCanvas();
                // Re-trigger resize on orientation change
                window.addEventListener('resize', resizeCanvas);
                window.addEventListener('orientationchange', () => {
                    setTimeout(resizeCanvas, 100);
                });
            }, 0);
        });
    </script>
</body>
</html>
